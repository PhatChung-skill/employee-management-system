<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Gia hạn hợp đồng</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
  <div th:replace="~{fragments/hr-header :: header}"></div>

  <div class="container">
    <h1>Gia hạn hợp đồng</h1>
    
    <div class="info-section">
      <table class="info-table">
        <tr>
          <th>Nhân viên:</th>
          <td th:text="${contract.emp != null ? contract.emp.fullName : '-'}">-</td>
        </tr>
        <tr>
          <th>Loại hợp đồng:</th>
          <td th:text="${contract.contractType != null ? contract.contractType : '-'}">-</td>
        </tr>
        <tr>
          <th>Ngày bắt đầu:</th>
          <td th:text="${contract.startDate != null ? contract.startDate : '-'}">-</td>
        </tr>
        <tr>
          <th>Ngày kết thúc hiện tại:</th>
          <td th:text="${contract.endDate != null ? contract.endDate : '-'}">-</td>
        </tr>
        <tr>
          <th>Mức lương hiện tại:</th>
          <td th:text="${contract.salary != null ? #numbers.formatDecimal(contract.salary, 0, 'POINT', 2, 'POINT') + ' VNĐ' : '-'}">-</td>
        </tr>
      </table>
    </div>

    <form th:action="@{'/hr/contracts/renew/' + ${contract.contractId}}" method="post" class="form-container">
      <div class="form-group">
        <label>Ngày kết thúc mới: <span style="color: red;">*</span></label>
        <input type="date" name="newEndDate" required/>
      </div>

      <div class="form-group">
        <label>Mức lương mới (tùy chọn):</label>
        <input type="number" name="newSalary" step="0.01" min="0" placeholder="Để trống nếu không thay đổi"/>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Gia hạn</button>
        <a th:href="@{/hr/contracts}" class="btn">Hủy</a>
      </div>
    </form>
  </div>
</body>
</html>
