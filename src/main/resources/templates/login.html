<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Login</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="center-card">
  <h2>Đăng nhập</h2>
  
  <!-- Error message -->
  <div th:if="${error}" class="alert alert-error" style="color: red; padding: 10px; margin-bottom: 15px; background-color: #ffe6e6; border: 1px solid #ff9999; border-radius: 4px;">
    <span th:text="${error}">Tên đăng nhập hoặc mật khẩu không đúng</span>
  </div>
  
  <!-- Success message -->
  <div th:if="${message}" class="alert alert-success" style="color: green; padding: 10px; margin-bottom: 15px; background-color: #e6ffe6; border: 1px solid #99ff99; border-radius: 4px;">
    <span th:text="${message}">Message</span>
  </div>
  
  <form th:action="@{/login}" method="post">
    <div><input type="text" name="username" placeholder="Username" required/></div>
    <div><input type="password" name="password" placeholder="Password" required/></div>
    <div><button type="submit">Login</button></div>
  </form>
  <p>Chưa có tài khoản? <a th:href="@{/register}">Đăng ký</a></p>
</div>
</body>
</html>
