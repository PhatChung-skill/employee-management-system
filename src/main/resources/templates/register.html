<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="center-card">
    <h2>Đăng ký</h2>
    <form th:action="@{/register}" method="post">
        <input type="text" name="username" placeholder="Username" required/>
        <input type="password" name="password" placeholder="Password" required/>
        <input type="text" name="fullName" th:field="${employee.fullName}" placeholder="Họ và tên" required/>
        <input type="email" name="email" th:field="${employee.email}" placeholder="Email"/>
        <button type="submit">Register</button>
    </form>
    <p>Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a></p>
</div>
</body>
</html>
