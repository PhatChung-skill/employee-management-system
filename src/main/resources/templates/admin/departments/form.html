<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="${department.deptId != null ? 'Sửa phòng ban' : 'Thêm phòng ban'}">Form phòng ban</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
  <div th:replace="~{fragments/admin-header :: header}"></div>

  <div class="container">
    <h1 th:text="${department.deptId != null ? 'Sửa phòng ban' : 'Thêm phòng ban'}">Form phòng ban</h1>
    
    <div th:if="${error}" class="alert alert-error" style="color: red; padding: 10px; margin-bottom: 15px; background-color: #ffe6e6; border: 1px solid #ff9999; border-radius: 4px;">
      <span th:text="${error}"></span>
    </div>
    
    <form th:object="${department}" 
          th:action="${department.deptId != null ? '/admin/departments/edit/' + department.deptId : '/admin/departments/add'}" 
          method="post" class="form-container">
      <input type="hidden" th:if="${department.deptId != null}" th:field="*{deptId}"/>
      
      <div class="form-group">
        <label>Tên phòng ban: <span style="color: red;">*</span></label>
        <input type="text" th:field="*{deptName}" required/>
      </div>

      <div class="form-group">
        <label>Địa điểm:</label>
        <input type="text" th:field="*{location}"/>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Lưu</button>
        <a th:href="@{/admin/departments}" class="btn">Hủy</a>
      </div>
    </form>
  </div>
</body>
</html>
