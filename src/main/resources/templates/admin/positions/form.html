<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="${position.positionId != null ? 'Sửa chức vụ' : 'Thêm chức vụ'}">Form chức vụ</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
  <div th:replace="~{fragments/admin-header :: header}"></div>

  <div class="container">
    <h1 th:text="${position.positionId != null ? 'Sửa chức vụ' : 'Thêm chức vụ'}">Form chức vụ</h1>
    
    <div th:if="${error}" class="alert alert-error" style="color: red; padding: 10px; margin-bottom: 15px; background-color: #ffe6e6; border: 1px solid #ff9999; border-radius: 4px;">
      <span th:text="${error}"></span>
    </div>
    
    <form th:object="${position}" 
          th:action="${position.positionId != null ? '/admin/positions/edit/' + position.positionId : '/admin/positions/add'}" 
          method="post" class="form-container">
      <input type="hidden" th:if="${position.positionId != null}" th:field="*{positionId}"/>
      
      <div class="form-group">
        <label>Tên chức vụ: <span style="color: red;">*</span></label>
        <input type="text" th:field="*{positionName}" required/>
      </div>

      <div class="form-group">
        <label>Lương cơ bản:</label>
        <input type="number" th:field="*{baseSalary}" step="0.01" min="0" placeholder="Nhập số tiền"/>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Lưu</button>
        <a th:href="@{/admin/positions}" class="btn">Hủy</a>
      </div>
    </form>
  </div>
</body>
</html>
